<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Impressum – SALTZ</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      background: url('background.jpg') no-repeat center center/cover;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      box-sizing: border-box;
      position: relative;
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0, 0, 0, 0.4),
        rgba(0, 0, 0, 0.8)
      );
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
    }

    h1 {
      margin: 0 0 20px 0;
      font-size: 2rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h2 {
      margin: 0 0 20px 0;
      font-size: 1rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.8);
    }

    .address-box {
      background: white;
      padding: 20px;
      border-radius: 12px;
      display: inline-block;
    }

    .address-box img {
      max-width: 100%;
      height: auto;
      display: block;
    }

    .back {
      margin-top: 30px;
    }

    .back a {
      color: rgba(255,255,255,0.7);
      text-decoration: none;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      border-bottom: 1px solid rgba(255,255,255,0.4);
    }

    .back a:hover {
      color: white;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Impressum</h1>
    <h2>Ansprechpartner</h2>

    <div class="address-box">
      <img src="adresse.gif" alt="Ansprechpartner SALTZ">
    </div>

    <div class="back">
      <a href="index.html">Zurück zur Startseite</a>
    </div>
  </div>

</body>
</html>
