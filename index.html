<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SALTZ</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: Arial, sans-serif;
      color: white;
      overflow: hidden;
    }

    body {
      position: relative;
      background: url('background.jpg') no-repeat center center/cover;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(1px);
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
    }

    .logo {
      position: absolute;
      top: 16%;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      padding: 0 20px;
    }

    .logo img {
      width: 720px;
      max-width: 90%;
      height: auto;
      filter:
        drop-shadow(0 0 6px rgba(255,255,255,0.35))
        drop-shadow(0 0 18px rgba(255,255,255,0.15));
    }

    .event {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 100%;
      padding: 0 20px;
    }

    .event-box {
      display: inline-block;
      padding: 22px 28px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 18px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .event-title {
      font-size: 2rem;
      letter-spacing: 0.04em;
      margin-bottom: 10px;
    }

    .event-date {
      font-size: 1.05rem;
      opacity: 0.9;
      margin-bottom: 12px;
    }

    .event a {
      color: white;
      text-decoration: none;
      border-bottom: 1px solid rgba(255, 255, 255, 0.7);
      padding-bottom: 2px;
      transition: opacity 0.2s ease, border-color 0.2s ease;
    }

    .event a:hover {
      opacity: 0.75;
      border-color: white;
    }

    .music-links {
      position: absolute;
      bottom: 70px;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      padding: 0 20px;
      display: flex;
      justify-content: center;
      gap: 22px;
      flex-wrap: wrap;
    }

    .music-links a {
      color: rgba(255, 255, 255, 0.92);
      text-decoration: none;
      font-size: 1rem;
      letter-spacing: 0.03em;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .music-links a:hover {
      opacity: 0.7;
      transform: translateY(-1px);
    }

    .legal {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
      padding: 0 20px;
    }

    .legal a {
      color: rgba(255, 255, 255, 0.68);
      text-decoration: none;
      font-size: 0.82rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      transition: opacity 0.2s ease;
    }

    .legal a:hover {
      opacity: 0.75;
    }

    @media (max-width: 768px) {
      .logo {
        top: 14%;
      }

      .logo img {
        width: 520px;
      }

      .event-title {
        font-size: 1.45rem;
      }

      .event-date {
        font-size: 0.98rem;
      }

      .music-links {
        bottom: 82px;
        gap: 14px;
      }

      .music-links a {
        font-size: 0.95rem;
      }

      .legal {
        bottom: 20px;
      }
    }

    @media (max-width: 480px) {
      .event-box {
        padding: 18px 18px;
        border-radius: 14px;
      }

      .event-title {
        font-size: 1.2rem;
      }

      .event-date {
        font-size: 0.9rem;
      }

      .music-links {
        gap: 12px;
      }

      .music-links a {
        font-size: 0.9rem;
      }

      .legal a {
        font-size: 0.75rem;
      }
    }
  </style>
</head>
<body>
  <div class="page">

    <div class="logo">
      <img src="saltz.gif" alt="SALTZ Logo">
    </div>

    <div class="event">
      <div class="event-box">
        <div class="event-title">Rohrer Seefest</div>
        <div class="event-date">Freitag, 12. Juni 2026 · 18:30</div>
        <a href="https://www.rohrer-seefest.de/" target="_blank" rel="noopener noreferrer">
          www.rohrer-seefest.de
        </a>
      </div>
    </div>

    <div class="music-links">
      <a href="https://open.spotify.com/intl-de/artist/0eVIT1rUASLXVpxWbCzB95" target="_blank" rel="noopener noreferrer">Spotify</a>
      <a href="https://music.apple.com/us/artist/saltz/1070209413" target="_blank" rel="noopener noreferrer">Apple Music</a>
      <a href="https://music.youtube.com/channel/UCRq2ulpQPC80mSG7lnyeNlA" target="_blank" rel="noopener noreferrer">YouTube</a>
      <a href="https://www.amazon.com/music/player/artists/B01A6GRF0A/saltz" target="_blank" rel="noopener noreferrer">Amazon Music</a>
    </div>

    <div class="legal">
      <a href="impressum.html">Impressum</a>
      <a href="datenschutz.html">Datenschutz</a>
    </div>

  </div>
</body>
</html>
