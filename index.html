<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SALTZ</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      font-family: Arial, sans-serif;
      color: white;
    }

    body {
      position: relative;
      min-height: 100vh;
      background:
        linear-gradient(to bottom, rgba(0, 0, 0, 0.25), rgba(0, 0, 0, 0.72)),
        url('background.jpg') no-repeat center center/cover;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 18%, rgba(255,255,255,0.14), transparent 32%),
        radial-gradient(circle at 50% 82%, rgba(255,120,0,0.10), transparent 30%);
      pointer-events: none;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 48px 24px 24px;
      text-align: center;
    }

    .hero {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 20px;
    }

    .logo img {
      width: min(920px, 92vw);
      height: auto;
      filter:
        drop-shadow(0 0 6px rgba(255,255,255,0.35))
        drop-shadow(0 0 18px rgba(255,255,255,0.25))
        drop-shadow(0 0 40px rgba(255,255,255,0.12));
    }

    .tagline {
      margin-top: 14px;
      font-size: 0.95rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.78);
    }

    .centerpiece {
      width: 100%;
      display: flex;
      justify-content: center;
      padding: 32px 0;
    }

    .event-box {
      width: min(760px, 100%);
      padding: 30px 28px;
      border: 1px solid rgba(255,255,255,0.16);
      background: linear-gradient(
        to bottom,
        rgba(255,255,255,0.10),
        rgba(255,255,255,0.04)
      );
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 22px;
      box-shadow:
        0 0 30px rgba(0,0,0,0.22),
        0 0 60px rgba(255,255,255,0.05);
    }

    .eyebrow {
      display: inline-block;
      margin-bottom: 14px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.14);
      font-size: 0.78rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.85);
    }

    .event-title {
      font-size: clamp(2rem, 4vw, 3.6rem);
      line-height: 1;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      margin-bottom: 14px;
      text-shadow: 0 0 18px rgba(255,255,255,0.12);
    }

    .event-meta {
      font-size: clamp(1rem, 1.9vw, 1.25rem);
      line-height: 1.6;
      color: rgba(255,255,255,0.92);
      margin-bottom: 22px;
    }

    .cta {
      display: inline-block;
      padding: 14px 24px;
      border-radius: 999px;
      color: white;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      font-size: 0.9rem;
      border: 1px solid rgba(255,255,255,0.24);
      background: linear-gradient(
        to right,
        rgba(255,255,255,0.16),
        rgba(255,255,255,0.08)
      );
      transition: transform 0.2s ease, opacity 0.2s ease, background 0.2s ease;
      box-shadow: 0 0 24px rgba(255,255,255,0.08);
    }

    .cta:hover {
      transform: translateY(-2px);
      opacity: 0.92;
      background: linear-gradient(
        to right,
        rgba(255,255,255,0.22),
        rgba(255,255,255,0.10)
      );
    }

    .footer {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      padding-bottom: 6px;
    }

    .music-links {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 18px;
    }

    .music-links a {
      color: rgba(255,255,255,0.92);
      text-decoration: none;
      padding: 10px 14px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 999px;
      background: rgba(255,255,255,0.05);
      font-size: 0.95rem;
      letter-spacing: 0.05em;
      transition: transform 0.2s ease, opacity 0.2s ease, background 0.2s ease;
    }

    .music-links a:hover {
      transform: translateY(-2px);
      opacity: 0.9;
      background: rgba(255,255,255,0.10);
    }

    .legal {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 6px;
    }

    .legal a {
      color: rgba(255,255,255,0.38);
      text-decoration: none;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      transition: opacity 0.2s ease, color 0.2s ease;
    }

    .legal a:hover {
      opacity: 0.9;
      color: rgba(255,255,255,0.65);
    }

    @media (max-width: 700px) {
      .page {
        padding: 28px 16px 20px;
      }

      .tagline {
        font-size: 0.8rem;
        letter-spacing: 0.2em;
      }

      .event-box {
        padding: 24px 18px;
        border-radius: 18px;
      }

      .eyebrow {
        font-size: 0.72rem;
        padding: 7px 11px;
      }

      .music-links {
        gap: 12px;
      }

      .music-links a {
        font-size: 0.9rem;
        padding: 9px 12px;
      }

      .legal a {
        font-size: 0.65rem;
      }
    }
  </style>
</head>
<body>
  <div class="page">

    <section class="hero">
      <div class="logo">
        <img src="saltz.gif" alt="SALTZ Logo">
      </div>
      <div class="tagline">Live Electronic Festival Set</div>
    </section>

    <section class="centerpiece">
      <div class="event-box">
        <div class="eyebrow">Next Show</div>
        <div class="event-title">Rohrer Seefest</div>
        <div class="event-meta">
          Freitag, 12. Juni 2026<br>
          18:30 Uhr
        </div>
        <a class="cta" href="https://www.rohrer-seefest.de/" target="_blank" rel="noopener noreferrer">
          Festival Infos
        </a>
      </div>
    </section>

    <footer class="footer">
      <div class="music-links">
        <a href="https://open.spotify.com/intl-de/artist/0eVIT1rUASLXVpxWbCzB95" target="_blank" rel="noopener noreferrer">Spotify</a>
        <a href="https://music.apple.com/us/artist/saltz/1070209413" target="_blank" rel="noopener noreferrer">Apple Music</a>
        <a href="https://music.youtube.com/channel/UCRq2ulpQPC80mSG7lnyeNlA" target="_blank" rel="noopener noreferrer">YouTube</a>
        <a href="https://www.amazon.com/music/player/artists/B01A6GRF0A/saltz" target="_blank" rel="noopener noreferrer">Amazon Music</a>
      </div>

      <div class="legal">
        <a href="impressum.html">Impressum</a>
        <a href="datenschutz.html">Datenschutz</a>
      </div>
    </footer>

  </div>
</body>
</html>
