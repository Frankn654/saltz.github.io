<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>SALTZ</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;
      background: url('background.jpg') no-repeat center center/cover;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .logo {
      position: absolute;
      top: 20%; /* etwas höher */
      transform: translateY(-50%);
    }

    .logo img {
      width: 600px; /* doppelt so groß */
      max-width: 90%;
      filter: brightness(0) invert(1); /* macht das Logo weiß */
    }

    .event {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.8em;
    }

    .event a {
      color: white;
      text-decoration: underline;
    }

    .links {
      position: absolute;
      bottom: 5%; /* wirklich im unteren Drittel */
    }

    .links a {
      color: white;
      text-decoration: none;
      margin: 0 15px;
      font-size: 1.5em;
      border-bottom: 2px solid white;
    }

    .links a:hover {
      opacity: 0.7;
    }
  </style>
</head>
<body>

  <div class="logo">
    <img src="saltz.gif" alt="SALTZ Logo">
  </div>

  <div class="event">
    <div>
      Rohrer Seefest<br>
      Freitag 12. Juni 2026 - 18:30<br>
      <a href="https://www.rohrer-seefest.de/" target="_blank">
        www.rohrer-seefest.de
      </a>
    </div>
  </div>

  <div class="links">
    <a href="https://open.spotify.com/intl-de/artist/0eVIT1rUASLXVpxWbCzB95">Spotify</a>
    <a href="https://music.apple.com/us/artist/saltz/1070209413">Apple Music</a>
    <a href="https://music.youtube.com/channel/UCRq2ulpQPC80mSG7lnyeNlA">YouTube</a>
    <a href="https://www.amazon.com/music/player/artists/B01A6GRF0A/saltz">Amazon Music</a>
  </div>

</body>
</html>
