<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Impressum – SALTZ</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      background: url('background.jpg') no-repeat center center/cover;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      box-sizing: border-box;
      position: relative;
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0, 0, 0, 0.35),
        rgba(0, 0, 0, 0.78)
      );
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255,255,255,0.14);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      padding: 40px;
      max-width: 720px;
      width: 100%;
      border-radius: 20px;
      text-align: left;
      line-height: 1.7;
      box-shadow:
        0 0 30px rgba(0,0,0,0.25),
        0 0 60px rgba(255,255,255,0.04);
    }

    h1 {
      text-align: center;
      margin-top: 0;
      margin-bottom: 30px;
      font-size: 2.2rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h2 {
      font-size: 1.1rem;
      margin-top: 28px;
      margin-bottom: 12px;
      color: rgba(255,255,255,0.94);
    }

    p {
      margin: 0 0 14px 0;
      color: rgba(255,255,255,0.9);
    }

    a {
      color: white;
      text-decoration: underline;
    }

    .address-box {
      margin-top: 12px;
      padding: 20px;
      border-radius: 14px;
      background: white;
      border: 1px solid rgba(255,255,255,0.18);
      text-align: center;
      box-shadow:
        0 0 20px rgba(255,255,255,0.08);
    }

    .address-box img {
      max-width: 100%;
      height: auto;
      display: inline-block;
    }

    .back {
      text-align: center;
      margin-top: 35px;
    }

    .back a {
      text-decoration: none;
      border-bottom: 1px solid rgba(255,255,255,0.5);
      padding-bottom: 2px;
      color: rgba(255,255,255,0.75);
      font-size: 0.9rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .back a:hover {
      color: white;
    }

    @media (max-width: 700px) {
      .container {
        padding: 28px 22px;
      }

      h1 {
        font-size: 1.7rem;
      }

      h2 {
        font-size: 1rem;
      }

      .address-box {
        padding: 16px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Impressum</h1>

    <p>Angaben gemäß § 5 TMG</p>

    <h2>Ansprechpartner</h2>
    <div class="address-box">
      <img src="images/adresse.gif" alt="Ansprechpartner SALTZ">
    </div>

    <p style="margin-top: 20px;">
      E-Mail:
      <a href="mailto:master@saltz.de">master@saltz.de</a>
    </p>

    <h2>Verantwortlich für den Inhalt nach § 55 Abs. 2 RStV</h2>
    <div class="address-box">
      <img src="adresse.gif" alt="Verantwortlicher SALTZ">
    </div>

    <div class="back">
      <a href="index.html">Zurück zur Startseite</a>
    </div>
  </div>

</body>
</html>
